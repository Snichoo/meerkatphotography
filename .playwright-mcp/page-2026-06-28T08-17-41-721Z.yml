      - generic [ref=e16]:
        - heading "Services" [level=1] [ref=e17]
        - heading "Great photography doesn’t just speak for itself… it speaks for you, it works for you and it commands an audience." [level=2] [ref=e18]
        - paragraph [ref=e19]: At Kit Photography we love to captivate and create. Whether it’s bringing your vision to life or collaboratively designing how to capture your business potential. We have the experience, expertise and professional flexibility to provide a comprehensive range of photography and video services to meet your business photography needs. So have a browse, and see how we can help you capture your business in its best light.
        - link "Scroll to browse" [ref=e20] [cursor=pointer]:
          - /url: "#link-commercial-photography"
      - generic [ref=e21]:
        - generic [ref=e23]:
          - heading "Commercial Photography" [level=2] [ref=e24]
          - generic [ref=e25]:
            - paragraph [ref=e26]: Our commercial photography service creates compelling and unique images for all your commercial needs, including advertising, marketing, and establishing a cohesive brand image. It is a powerful tool to showcase your products, and services, and highlight your unique selling points while establishing and communicating a strong brand identity.
            - paragraph [ref=e27]: Find out how our commercial photography services can help you stand out from the competition, and elevate your business image.
          - link "View Commercial Photography" [ref=e28] [cursor=pointer]:
            - /url: /services/commercial-photography/
        - generic [ref=e30]:
          - heading "Corporate Photography" [level=2] [ref=e31]
          - generic [ref=e32]:
            - paragraph [ref=e33]: Professional corporate photography is essential to establish or enhance your brand and corporate image while connecting with your audience. Our service provides high-quality images that accurately reflect your company's values, culture, and brand identity, creating a professional presence that accurately represents your business.
            - paragraph [ref=e34]: Find out more below about how our corporate photography packages can help you strengthen your business image and connect with your customers, stakeholders and employees.
          - link "View Corporate Photography" [ref=e35] [cursor=pointer]:
            - /url: /services/corporate-photography/
        - generic [ref=e37]:
          - heading "Corporate Headshot Photography" [level=2] [ref=e38]
          - paragraph [ref=e40]: Present yourself and your team in the best possible light with professional corporate headshot photography. We capture beautiful images of your professionals either onsite or in the studio, in a style that aligns with your corporate image, and individual personality. Create a natural and engaging first impression that best reflects your business with our corporate headshot photography.
          - link "View Corporate Headshot Photography" [ref=e41] [cursor=pointer]:
            - /url: /services/corporate-headshot-photography/
        - generic [ref=e43]:
          - heading "Lifestyle Photography" [level=2] [ref=e44]
          - paragraph [ref=e46]: The power of professional lifestyle photography cannot be ignored. Lifestyle photography has the unique ability to captivate the imagination, desires and aspirations of an audience, through the use of authentic, and relatable imagery. Drawing the viewer into an evocative visual narrative of your brand, lifestyle photography encourages an emotional connection with your business, brand identity and values. With the subtle integration of your business's product and services, lifestyle photography avoids the overt sales pitch, instead allowing your audience to organically form positive associations and connections with your business, and see how their experience could be enhanced with your product or service.
          - link "View Lifestyle Photography" [ref=e47] [cursor=pointer]:
            - /url: /services/lifestyle-photography/
        - generic [ref=e49]:
          - heading "Portrait Photography" [level=2] [ref=e50]
          - paragraph [ref=e52]: Commercial Portrait photography captures the essence and personality of individuals through artistic and skillful techniques. Employing a professional ensures high-quality results that truly represent you, and communicate a multitude of your unique qualities and characteristics in a single image. Corporate portrait photography gives you the confidence you are putting your best self forward for all essential media, personal branding, and professional profiles.
          - link "View Portrait Photography" [ref=e53] [cursor=pointer]:
            - /url: /services/portrait-photography/
        - generic [ref=e55]:
          - heading "Product Photography" [level=2] [ref=e56]
          - paragraph [ref=e58]: Commercial Product photography is essential for business success. It has the power to inspire and captivate customers, drive sales, and establish an irresistible brand presence. Showcase your products in the best possible light, setting you apart from the competition and leaving a lasting impression on the market.
          - link "View Product Photography" [ref=e59] [cursor=pointer]:
            - /url: /services/product-photography/
        - generic [ref=e61]:
          - heading "Event Photography" [level=2] [ref=e62]
          - paragraph [ref=e64]: At Kit Photography, we specialise in capturing the essence of your special events. With 15 years of experience in corporate event photography, our people-focused, 'fly on the wall' approach ensures authentic, high-quality photos. Trusted by Australia's leading brands, we're the go-to photographer for events that matter. Book your session today!
          - link "View Event Photography" [ref=e65] [cursor=pointer]:
            - /url: /services/event-photography/
        - generic [ref=e67]:
          - heading "Fitness Photography" [level=2] [ref=e68]
          - paragraph [ref=e70]: Elevate your fitness brand with Kit Photography, Melbourne's leading experts in fitness photography. With 15 years of experience and a people-first approach, we specialize in a wide range of disciplines from strength training to yoga. Choose us for dynamic, professionally executed images that truly resonate with your audience. Contact us today to get started.
          - link "View Fitness Photography" [ref=e71] [cursor=pointer]:
            - /url: /services/fitness-photography/
        - generic [ref=e73]:
          - heading "Property Photography" [level=2] [ref=e74]
          - link "View Property Photography" [ref=e75] [cursor=pointer]:
            - /url: /services/property-photography/
        - generic [ref=e77]:
          - heading "Food Photography" [level=2] [ref=e78]
          - paragraph [ref=e80]: Welcome to 'Let's Eat', a tantalising gallery showcasing our collection of food and service style images. Feast your eyes on the vibrant colors, textures, and compositions we've captured, each telling a unique story of culinary art and hospitality.
          - link "View Food Photography" [ref=e81] [cursor=pointer]:
            - /url: /services/food-photography/
        - generic [ref=e83]:
          - heading "Videography" [level=2] [ref=e84]
          - paragraph [ref=e86]: At KIT Photography, our professional videographers create clean, natural, and polished videos designed to connect. Combining years of photography experience with versatile videography skills, our talented Melbourne-based team expertly captures commercial videography and corporate events, delivering engaging, high-quality content tailored specifically to your brief and audience.
          - link "View Videography" [ref=e87] [cursor=pointer]:
            - /url: /services/videography/
