      - paragraph [ref=e83]: A 4m³ mobile skip trailer is what you book when a traditional steel skip can't physically fit down your driveway, or you don't fancy filling out a council permit form to park rubbish outside your own house. Here's what you actually get when Brad rocks up.
      - generic [ref=e84]:
        - generic [ref=e85]:
          - img [ref=e86]
          - generic [ref=e87]:
            - heading "Fits Where Steel Skips Can’t" [level=3] [ref=e88]
            - paragraph [ref=e89]: Tight inner-city driveways, underground carparks, narrow lanes, behind the gate next to the garage. If a tradesman’s ute can get there, the trailer can get there.
        - generic [ref=e90]:
          - img [ref=e91]
          - generic [ref=e92]:
            - heading "Lockable Lid Stops Overnight Dumpers" [level=3] [ref=e93]
            - paragraph [ref=e94]: The lid clicks shut and locks. Strangers can’t tip their rubbish in overnight and the lid stays closed until you next need it open.
        - generic [ref=e95]:
          - img [ref=e96]
          - generic [ref=e97]:
            - heading "No Council Permits" [level=3] [ref=e98]
            - paragraph [ref=e99]: The skip is a road-registered trailer, so you can park it legally on the street outside your place. With a regular skip bin you’re filling out a BCC permit form and paying for the privilege. With us, you’re not.
        - generic [ref=e100]:
          - img [ref=e101]
          - generic [ref=e102]:
            - heading "Won’t Crack Concrete or Wreck the Lawn" [level=3] [ref=e103]
            - paragraph [ref=e104]: A regular skip sits on metal feet and leaves rust marks, crack lines, and lawn damage. Ours rolls on rubber wheels. We drop it, position it, and take it away with our ute when we’re done.
        - generic [ref=e105]:
          - img [ref=e106]
          - generic [ref=e107]:
            - heading "Loads at Waist Height" [level=3] [ref=e108]
            - paragraph [ref=e109]: Walk loads of timber, plasterboard, and green waste straight in through the rear barn doors. You’re not hoisting a 30kg load over a 1.2m steel wall. Your back will notice the difference compared to a regular skip.
