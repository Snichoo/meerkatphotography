        - generic [ref=e124]:
          - paragraph [ref=e125]: Professional corporate photography is able to capture and communicate your business’s culture, brand and professionalism while introducing the staff, services, and defining features of your company to your target audience.
          - paragraph
          - paragraph [ref=e126]:
            - text: At
            - link "Kit Photography" [ref=e127] [cursor=pointer]:
              - /url: https://kitphotography.com.au/
            - text: we have over 15 years of experience providing a large range of corporate photography services that can be tailored to your business’s individual needs. From full photo and video production services, including hair and make-up, stylist, producer, and studio hire, to event coverage, branding, annual reports, and in-house
            - link "corporate headshot photography" [ref=e128] [cursor=pointer]:
              - /url: https://kitphotography.com.au/services/corporate-headshot-photography/
            - text: .
          - paragraph
          - heading "Business Photography Specialist" [level=4] [ref=e129]:
            - strong [ref=e130]: Business Photography Specialist
          - paragraph
          - paragraph [ref=e131]: We know how important and influential this public face of your company is. That’s why we take the time to discuss in detail the scope of the work, your ideas, your values, and research key elements of importance. So that you can utilize our skills, services, and expertise to maximum benefit when you collaborate with us on your corporate photography project.
          - paragraph
          - paragraph [ref=e132]: We truly love what we do, and feel fortunate that our skills and experience have seen us complete a huge range of corporate photography over the years. From large production shoots involving 80 case study shoots across Victoria over two years, and Flagship manufacturing plant openings and corporate events, to more candid intimate shoots detailing board meetings and employee interactions. These event shoots, portraits, candid employee interactions, and contextual shots are all able to communicate the culture and tell the story of the business I’m working with, and it is a real pleasure to be a part.
          - paragraph
          - paragraph [ref=e133]: Our skill, experience, and personable professionalism mean we are able to help you feel at ease, and relaxed through the entire process. We are professionals. And we find that a relaxed, happy, confident client makes for the best result. So we make sure to break down the brief and attend to all the elements in communication and collaboration with our client prior to execution so that you can enjoy the process and be truly impressed with the results.
          - paragraph
          - paragraph [ref=e134]:
            - text: If you are interested in our corporate photography packages or would like to have a chat please click the
            - link "Get a Quote" [ref=e135] [cursor=pointer]:
              - /url: https://kitphotography.com.au/contact/
            - text: .
          - paragraph
